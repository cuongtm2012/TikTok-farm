app:
  name: "TikTok Farm"
  version: "1.0.0"
  debug: false
  log_level: "INFO"

database:
  path: "data/farm.db"

proxies:
  csv_path: "config/proxies.csv"
  check_timeout: 5
  max_fail_before_disable: 3

scheduler:
  posts_per_day: 3
  farm_sessions_per_day: 3
  farm_session_minutes: 15
  post_time_slots:
    - ["08:00", "11:00"]
    - ["14:00", "17:00"]
    - ["19:00", "22:00"]

content:
  images_per_post: 5
  output_dir: "data/posts/"

camoufox:
  headless: true
  profile_dir: "profiles/"
  navigation_timeout: 30000

health_check:
  interval_minutes: 60
  alert_on_shadowban: true
  alert_on_rate_limit: true

telegram:
  enabled: false
  bot_token: ""
  chat_id: ""
