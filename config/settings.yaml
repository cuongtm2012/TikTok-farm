app:
  name: "TikTok Farm"
  version: "1.0.0"
  debug: false
  log_level: "INFO"

database:
  # driver: sqlite | postgresql
  driver: postgresql
  path: "data/farm.db"   # used when driver=sqlite
  host: localhost
  port: 5433
  name: tiktok_farm
  user: tiktok_farm
  password: tiktok_farm_secret

proxies:
  csv_path: "config/proxies.csv"
  check_timeout: 5
  max_fail_before_disable: 3

scheduler:
  posts_per_day: 3
  farm_sessions_per_day: 3
  farm_session_minutes: 15
  post_time_slots:
    - ["08:00", "11:00"]
    - ["14:00", "17:00"]
    - ["19:00", "22:00"]

camoufox:
  headless: true
  profile_dir: "profiles/"
  navigation_timeout: 30000
  use_camoufox: false   # true when pip install camoufox

redis:
  enabled: false
  host: localhost
  port: 6379
  db: 0
  password: ""

warmup:
  days: 7
  auto_assign_proxy: true

accounts:
  yaml_path: "config/accounts.yaml"

content:
  images_per_post: 5
  output_dir: "data/posts/"
  default_affiliate_link: ""

health_check:
  interval_minutes: 60
  alert_on_shadowban: true
  alert_on_rate_limit: true

telegram:
  enabled: false
  bot_token: ""
  chat_id: ""
