# TikTok Farm - Server docker-compose (production)
# FIXED v2: Correct port mapping, bind mount for existing DB, clean exit codes

services:
  tiktok-farm:
    build: .
    image: tiktok-farm:stable
    container_name: tiktok-farm
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/data/tiktok-farm:/app/data
      - /var/data/tiktok-farm-logs:/app/logs
      - farm_profiles:/app/profiles
      - farm_content:/app/content
      - ./config:/app/config:ro
    environment:
      - DATABASE_DRIVER=sqlite
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    stop_grace_period: 30s

volumes:
  farm_profiles:
  farm_content:
